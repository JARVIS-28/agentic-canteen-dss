[pytest]
# Pytest configuration — Bharat-MAS test suite

# Test discovery
python_files   = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum version
minversion = 7.0

# Default options
addopts =
    --strict-markers
    --tb=short
    --disable-warnings
    -v

# Custom markers
markers =
    agent:       Unit tests for individual agents
    integration: End-to-end orchestrator tests
    simulation:  Real-world scenario simulations
    comparative: Multi-approach comparison tests (for paper)
    slow:        Slow tests — deselect with -m "not slow"
    skip_ci:     Skip in CI/CD pipeline

# Asyncio mode (for trend agent async tests)
asyncio_mode = auto

# Test root — run from backend/ directory
testpaths = tests

[coverage:run]
source = agents,services

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:

min_coverage = 75
